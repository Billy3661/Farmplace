services:
  - type: web
    name: farmplace
    runtime: python
    buildCommand: pip install -r requirements/requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: farmplace-db
          property: connectionString
      - key: ALLOWED_HOSTS
        sync: false
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        sync: false
    preDeployCommand: python manage.py migrate && python manage.py seed_farmplace
    autoDeploy: true

  - type: postgresql
    name: farmplace-db
    plan: free
    databaseName: farmplace
