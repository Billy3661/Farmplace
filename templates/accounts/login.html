{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <span class="brand-icon"><i class="bi bi-seedling"></i></span>
            <h2>Welcome Back</h2>
            <p>Login to your FarmPlace account</p>
        </div>

        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary w-100 mt-3">
                <i class="bi bi-box-arrow-in-right me-2"></i>Login
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="{% url 'accounts:register' %}">Register free</a>
        </div>
    </div>
</div>
{% endblock %}
