<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D5016"/>
      <stop offset="100%" style="stop-color:#1E3A0E"/>
    </linearGradient>
    <linearGradient id="leafMid" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#5AA830"/>
      <stop offset="100%" style="stop-color:#3A7A1A"/>
    </linearGradient>
    <linearGradient id="leafLight" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#7BC250"/>
      <stop offset="100%" style="stop-color:#5AA830"/>
    </linearGradient>
    <linearGradient id="stemGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3A6B1E"/>
      <stop offset="50%" style="stop-color:#4A8025"/>
      <stop offset="100%" style="stop-color:#3A6B1E"/>
    </linearGradient>
    <linearGradient id="soilGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6B4423"/>
      <stop offset="100%" style="stop-color:#4A2E15"/>
    </linearGradient>
    <linearGradient id="chickBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D44A"/>
      <stop offset="100%" style="stop-color:#D4A017"/>
    </linearGradient>
    <linearGradient id="cowBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6914"/>
      <stop offset="100%" style="stop-color:#6B4E10"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feOffset dx="0.5" dy="1" result="offsetBlur"/>
      <feFlood flood-color="#000" flood-opacity="0.2"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)" stroke="#D4A017" stroke-width="1.5"/>
  <circle cx="50" cy="50" r="44" fill="none" stroke="#D4A017" stroke-width="0.5" opacity="0.4"/>

  <!-- Soil -->
  <ellipse cx="50" cy="70" rx="20" ry="5" fill="url(#soilGrad)" opacity="0.8"/>
  <ellipse cx="50" cy="69" rx="17" ry="3.5" fill="#7A5230" opacity="0.3"/>

  <!-- Stem -->
  <path d="M50,68 Q49,56 50,40" stroke="url(#stemGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Left leaf -->
  <g transform="translate(50,52)">
    <path d="M0,0 C-8,-6 -18,-10 -22,-5 C-20,0 -12,4 -2,2 Z" fill="url(#leafMid)" opacity="0.95"/>
    <path d="M0,0 C-6,-4 -14,-7 -18,-5" fill="none" stroke="#2D6B12" stroke-width="0.5" opacity="0.5"/>
    <path d="M-4,-1 C-8,-4 -14,-6 -18,-5" fill="none" stroke="#8BD460" stroke-width="0.3" opacity="0.3"/>
  </g>

  <!-- Right leaf -->
  <g transform="translate(50,46)">
    <path d="M0,0 C6,-8 16,-14 20,-10 C18,-4 10,0 0,2 Z" fill="url(#leafLight)" opacity="0.9"/>
    <path d="M0,0 C6,-6 14,-10 18,-9" fill="none" stroke="#4A9525" stroke-width="0.4" opacity="0.5"/>
  </g>

  <!-- Top sprout -->
  <g transform="translate(50,38)">
    <path d="M0,0 C-4,-8 -6,-14 -3,-16 C0,-12 1,-6 0,0Z" fill="#6BC240" opacity="0.9"/>
    <path d="M0,0 C4,-8 6,-14 3,-16 C0,-12 -1,-6 0,0Z" fill="#5AA830" opacity="0.85"/>
  </g>

  <!-- Chick -->
  <g transform="translate(28,65) scale(0.55)" filter="url(#shadow)">
    <ellipse cx="0" cy="0" rx="8" ry="6" fill="url(#chickBody)"/>
    <ellipse cx="-2" cy="-1" rx="5" ry="4" fill="#F5D44A" opacity="0.5"/>
    <circle cx="6" cy="-4" r="5" fill="#F0D040"/>
    <circle cx="8" cy="-5" r="1.2" fill="#1A1A2E"/>
    <circle cx="8.3" cy="-5.3" r="0.4" fill="white" opacity="0.8"/>
    <polygon points="11,-4 14,-3.5 11,-3" fill="#E8722A"/>
    <path d="M5,-8 C4,-10 6,-11 7,-9 C8,-11 9,-10 8,-8" fill="#DC3545" opacity="0.8"/>
    <path d="M-8,-2 C-12,-4 -10,-7 -7,-3" fill="#D4A017" opacity="0.7"/>
    <line x1="-2" y1="6" x2="-3" y2="10" stroke="#E8722A" stroke-width="1" stroke-linecap="round"/>
    <line x1="2" y1="6" x2="3" y2="10" stroke="#E8722A" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Cow -->
  <g transform="translate(70,63) scale(0.45)" filter="url(#shadow)">
    <ellipse cx="0" cy="0" rx="12" ry="7" fill="url(#cowBody)"/>
    <ellipse cx="3" cy="-2" rx="4" ry="3" fill="#5C3D0E" opacity="0.4" transform="rotate(-15,3,-2)"/>
    <ellipse cx="12" cy="-3" rx="6" ry="5" fill="url(#cowBody)"/>
    <ellipse cx="15" cy="-2" rx="3" ry="2.5" fill="#C49520" opacity="0.6"/>
    <circle cx="13" cy="-5" r="1" fill="#1A1A2E"/>
    <ellipse cx="9" cy="-7" rx="3" ry="1.5" fill="#8B6914" transform="rotate(-30,9,-7)"/>
    <ellipse cx="15" cy="-7" rx="3" ry="1.5" fill="#8B6914" transform="rotate(30,15,-7)"/>
    <path d="M10,-8 C9,-12 11,-13 12,-10" fill="none" stroke="#C49520" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M14,-8 C13,-12 15,-13 16,-10" fill="none" stroke="#C49520" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-7" y1="7" x2="-7" y2="13" stroke="#6B4E10" stroke-width="2" stroke-linecap="round"/>
    <line x1="-2" y1="7" x2="-2" y2="13" stroke="#6B4E10" stroke-width="2" stroke-linecap="round"/>
    <line x1="4" y1="7" x2="4" y2="13" stroke="#6B4E10" stroke-width="2" stroke-linecap="round"/>
    <line x1="9" y1="7" x2="9" y2="13" stroke="#6B4E10" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
